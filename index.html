<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muladara Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Fredoka:wght@600&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="navbar">
      <a class="navbar-logo" href="/" aria-label="Muladara Studio">
        <span class="navbar-logo-name">muladara</span>
        <span class="navbar-logo-tagline">creative studio.</span>
      </a>
      <nav class="navbar-menu" aria-label="Principal">
        <a class="navbar-link" href="/creating.html">Creating</a>
        <a class="navbar-link" href="#raiz">Raiz</a>
        <a class="navbar-link" href="#what-we-do">What we do</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-label="Presentación del estudio">
        <div class="hero-viewport" data-hero-viewport tabindex="0">
          <div class="hero-track">
            <figure class="hero-cell">
              <img src="/img1.jpeg" alt="Conexión — Muladara Studio" draggable="false" />
            </figure>
            <figure class="hero-cell">
              <img src="/img2.jpeg" alt="Proceso — Muladara Studio" draggable="false" />
            </figure>
            <figure class="hero-cell">
              <img src="/img3.jpeg" alt="Identidad — Muladara Studio" draggable="false" />
            </figure>
            <figure class="hero-cell">
              <img src="/img4.jpeg" alt="Estrategia — Muladara Studio" draggable="false" />
            </figure>
            <figure class="hero-cell">
              <img src="/img5.jpeg" alt="Diseño — Muladara Studio" draggable="false" />
            </figure>
            <figure class="hero-cell">
              <img src="/img6.jpeg" alt="Marca — Muladara Studio" draggable="false" />
            </figure>
          </div>
        </div>

        <div class="hero-progress" aria-hidden="true">
          <span class="hero-progress-bar" data-hero-progress></span>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
